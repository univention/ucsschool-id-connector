@startuml

title ID-Connector Primary Components\n

!include styling.puml
' skinparam linetype ortho

!include object_importer.puml

frame "DC Primary\n<i>ucs" as primary {
    !include object_ldap.puml
    !include object_listener.puml
    !include object_converter.puml
}


!include object_small_queue.puml
!include object_large_queue.puml

!include object_id_connector.puml

importer - -> ldap: <b>write user data\n<i>python
ldap - -> listener: <b>call listener on write\n<i>python
listener - -> small_queue: <b>Write entryUUIDs\n<b>and change\n<i>JSON
small_queue - -> converter:  <b>Read entryUUIDS\n<b>and change\n<i>JSON
converter - -> large_queue: <b>Write user data\n<i>JSON
large_queue - ->id_connector:<b>Read user data\n<i>JSON

ldap <- - id_connector : <b>Read/write user data\n<i>UDM-REST-API
' id_connector - -> ldap
@enduml

@startuml

title ID-Connector Primary Components\n

skinparam backgroundColor white
skinparam defaultTextAlignment center

skinparam AgentBackgroundColor #438dd5
skinparam AgentFontColor white
skinparam AgentBorderColor #6a8198

skinparam StorageBackgroundColor #85bbf0
skinparam DatabaseBackgroundColor #85bbf0
skinparam FolderBackgroundColor #b0cae4
skinparam FileBackgroundColor lightgrey
skinparam UsecaseBackgroundColor white
skinparam UsecaseFontColor #777777
skinparam UsecaseBorderColor grey

skinparam ArrowColor #666666
skinparam ArrowFontColor #666666

skinparam FrameBackgroundColor #ebedf1


    agent "<b>UCS@School import\n<i>python\n\nImport user data" as importer

frame "DC Primary\n<i>ucs" as primary {
    database "<b>LDAP\n<i>openldap\n\nUser data" as ldap
    storage "<b>ID-Connector listener\n<i>python listener script\n\nHandles LDAP write events\nfor id-connector" as listener
    agent "<b>Converter\n<i>python\n\nReads uuid and writes\njson representation of udm\nobjects" as converter
}


    folder "<b>Small in-queue\n<i>JSON files\n\njust entryUUIDs" as small_queue
    folder "<b>Large in-queue\n<i>JSON files\n\nfull data" as large_queue


    frame "<b>ID-Connector\n<i>Docker\n\nsyncs user data" as id_connector

importer - -> ldap: <b>write user data\n<i>python
ldap - -> listener: <b>call listener on write\n<i>python
listener - -> small_queue: <b>Write entryUUIDs\n<b>and change\n<i>JSON
small_queue - -> converter:  <b>Read entryUUIDS\n<b>and change\n<i>JSON
converter - -> large_queue: <b>Write user data\n<i>JSON
large_queue - ->id_connector:<b>Read user data\n<i>JSON

ldap <- - id_connector : <b>Read/write user data\n<i>UDM-REST-API
@enduml

