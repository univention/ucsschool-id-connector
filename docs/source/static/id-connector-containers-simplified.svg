@startuml

title ID Connector: Containers\n

!include styling.puml
' skinparam linetype ortho

!include object_sms.puml
!include object_importer.puml
!include object_primary.puml


!include object_id_connector.puml

!include object_school_provider_a.puml
!include object_school_provider_b.puml

sms - -> importer : <b>export of user/group data\n<i>csv, etc.
importer - -> primary: <b>write user/group data\n<i>python
'primary<- -id_connector: <b>Write entryUUIDs\n<b>and changes\n<i>JSON

primary - -> id_connector: <b>Write user/group data\n<i>JSON
id_connector - -> school_provider_a:<b>Write user/group\n<i>HTTP
id_connector - -> school_provider_b:<b>Write user/group\n<i>HTTP
' primary <- - id_connector: <b>Read/write user/group data\n<i>UDM-REST-API
'primary - -> id_connector: <b>get extra data\npython-ldap


@enduml

@startuml

title ID Connector: Containers\n

skinparam backgroundColor white
skinparam defaultTextAlignment center

skinparam AgentBackgroundColor #438dd5
skinparam AgentFontColor white
skinparam AgentBorderColor #6a8198

skinparam FolderBackgroundColor #b0cae4
skinparam StorageBackgroundColor #85bbf0
skinparam DatabaseBackgroundColor #85bbf0

skinparam FileBackgroundColor lightgrey
skinparam UsecaseBackgroundColor white
skinparam UsecaseFontColor #777777
skinparam UsecaseBorderColor grey

skinparam ArrowColor #666666
skinparam ArrowFontColor #666666

skinparam FrameBackgroundColor #ebedf1

    Usecase "<b>School management software\n<i>custom system\n\nmanages users on state level" as sms
    agent "<b>UCS@School import\n<i>python\n\nImport user/group data" as importer
    frame "<b>DC Primary\n<i>UCS\n\nBasic user operations" as primary {
}



    frame "<b>ID-Connector\n<i>Docker\n\nsyncs user data" as id_connector

     usecase "<b>School provider A\n<i>UCS / Kelvin\n\nManages schools" as school_provider_a
     usecase "<b>School provider B\n<i>UCS / Kelvin\n\nManages schools" as school_provider_b

sms - -> importer : <b>export of user/group data\n<i>csv, etc.
importer - -> primary: <b>write user/group data\n<i>python

primary - -> id_connector: <b>Write user/group data\n<i>JSON
id_connector - -> school_provider_a:<b>Write user/group\n<i>HTTP
id_connector - -> school_provider_b:<b>Write user/group\n<i>HTTP


@enduml

